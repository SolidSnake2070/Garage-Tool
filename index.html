<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">SERVICE MONITOR</p>
        <h1>GARAGE PANEL</h1>
      </div>
      <div class="syncbox">
        <span class="sync-label">Speicher</span>
        <span class="sync-value">Lokal im Browser</span>
      </div>
    </header>

    <main class="grid" id="bikeGrid"></main>
  </div>

  <template id="bike-card-template">
    <section class="card">
      <div class="card-header">
        <div>
          <p class="card-type"></p>
          <h2 class="card-title"></h2>
        </div>
        <div class="status-badge">OK</div>
      </div>

      <div class="main-value-row">
        <label class="main-label"></label>
        <input class="main-input" type="number" step="0.1" />
      </div>

      <div class="service-list"></div>

      <div class="card-footer">
        <button class="save-btn">Speichern</button>
        <span class="save-info">nicht gespeichert</span>
      </div>
    </section>
  </template>

  <script src="script.js"></script>
</body>
</html>
